apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-pull
  namespace: rag-pipeline
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: model-pull
          image: ollama/ollama:latest
          env:
            - name: OLLAMA_HOST
              value: "ollama:11434"
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for Ollama to be ready..."
              until ollama list 2>/dev/null; do sleep 5; done
              echo "Pulling embedding model..."
              ollama pull nomic-embed-text
              echo "Pulling chat model..."
              ollama pull llama3.2
              echo "Models ready."
