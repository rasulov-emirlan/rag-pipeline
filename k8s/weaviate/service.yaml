apiVersion: v1
kind: Service
metadata:
  name: weaviate
  namespace: rag-pipeline
spec:
  selector:
    app: weaviate
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
    - port: 50051
      targetPort: grpc
      protocol: TCP
      name: grpc
  type: ClusterIP
